<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Jardineros</title>

    <!-- CONFIG TAILWIND -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#1C7C54',   // Turf Green
                        verdeClaro: '#73E2A7', // Light Green
                        verdeSuave: '#DEF4C6', // Tea Green
                        oscuro: '#1B512D',     // Dark Spruce
                        acento: '#B1CF5F'      // Yellow Green
                    }
                }
            }
        }
    </script>

    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-gradient-to-br from-verdeSuave via-white to-verdeClaro/20 min-h-screen">

<div class="app-shell flex min-h-screen">

    <!-- SIDEBAR -->
    <div th:replace="fragments/layout :: sidebar('jardinero')"></div>

    <!-- CONTENIDO -->
    <main class="app-main flex-1 p-6 lg:p-10">

        <!-- HEADER -->
        <section class="page-header">

            <div>
                <small>Gestión de Jardinero</small>

                <h1 th:text="${jardinero.id_jardinero == null} ? 'Registrar Jardinero' : 'Editar Jardinero'">
                    Registrar Jardinero
                </h1>

                <p>
                    Completa la información del jardinero para registrarlo o actualizar sus datos.
                </p>
            </div>

            <div class="buttons">
                <a th:href="@{/view/jardinero}" class="btn-custom btn-verde">
                    ← Volver
                </a>
            </div>

        </section>

        <!-- FORMULARIO -->
        <section class="bg-white rounded-[30px] shadow-xl overflow-hidden border border-[#DEF4C6]">

            <!-- HEADER FORM -->
            <div class="bg-[#1B512D] px-8 py-6">

                <h2 class="text-2xl font-bold text-white">
                    Datos del jardinero
                </h2>

                <p class="text-[#DEF4C6] mt-1">
                    Los campos marcados son necesarios para guardar la información.
                </p>

            </div>

            <form th:action="@{/view/jardinero/save}"
                  th:object="${jardinero}"
                  method="post"
                  novalidate
                  class="p-8">

                <input type="hidden" th:field="*{id_jardinero}" />

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- Nombre -->
                    <div>
                        <label class="block mb-2 font-bold text-oscuro">
                            Nombre
                        </label>

                        <input type="text"
                               th:field="*{nombre}"
                               required
                               placeholder="Ingrese el nombre completo"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-principal focus:ring-4 focus:ring-principal/20">
                    </div>

                    <!-- Documento -->
                    <div>
                        <label class="block mb-2 font-bold text-oscuro">
                            Documento
                        </label>

                        <input type="text"
                               th:field="*{documento}"
                               required
                               placeholder="Ingrese el documento completo"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-principal focus:ring-4 focus:ring-principal/20">
                    </div>

                    <!-- Direccion -->
                    <div>
                        <label class="block mb-2 font-bold text-oscuro">
                            Direccion
                        </label>

                        <input type="text"
                               th:field="*{direccion}"
                               required
                               placeholder="Ingrese la direccion completa"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition focus:border-principal focus:ring-4 focus:ring-principal/20">
                    </div>

                    <!-- ROL -->
                    <div>
                        <label class="block mb-2 font-bold text-oscuro">
                            Rol
                        </label>

                        <select th:field="*{rol}"
                                class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 text-oscuro outline-none transition focus:border-principal focus:ring-4 focus:ring-principal/20">

                            <option value="">Seleccionar rol...</option>
                            <option value="Cultivo">Cultivo</option>
                            <option value="Poda">Poda</option>
                            <option value="Fertilizacion">Fertilizacion</option>

                        </select>
                    </div>

                </div>

                <!-- BOTONES -->
                <div class="flex flex-col sm:flex-row justify-end gap-4 mt-8 pt-6 border-t border-gray-100">

                    <a th:href="@{/view/jardinero}"
                       class="btn-custom btn-verde justify-center">
                        ← Volver
                    </a>

                    <button type="submit"
                            class="btn-custom btn-principal justify-center">
                        💾 Guardar Jardinero
                    </button>

                </div>

            </form>

        </section>

    </main>

</div>

<script th:src="@{/js/script.js}"></script>
</body>
</html>
