<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario Plantas</title>

    <!-- TAILWIND -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- CONFIG TAILWIND -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        principal: '#1C7C54',
                        verdeClaro: '#73E2A7',
                        verdeSuave: '#DEF4C6',
                        oscuro: '#1B512D',
                        acento: '#B1CF5F'
                    }
                }
            }
        }
    </script>

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="bg-gradient-to-br from-[#DEF4C6] via-white to-[#73E2A7]/20 min-h-screen">

<div class="app-shell flex min-h-screen">

    <!-- SIDEBAR -->
    <div th:replace="fragments/layout :: sidebar('plantas')"></div>

    <!-- CONTENIDO -->
    <main class="app-main flex-1 p-6 lg:p-10">

        <!-- HEADER -->
        <section class="page-header">

            <div>

                <small class="text-[#1C7C54] font-semibold">
                    Gestión de Plantas
                </small>

                <h1 class="text-[#1B512D]"
                    th:text="${plantas.id_plantas == null} ? 'Registrar Planta' : 'Editar Planta'">
                    Registrar Planta
                </h1>

                <p class="text-gray-600">
                    Completa la información de la planta para registrarla o actualizar sus datos.
                </p>

            </div>

            <div class="buttons">

                <a th:href="@{/view/plantas}"
                   class="btn-custom btn-verde">
                    ← Volver
                </a>

            </div>

        </section>

        <!-- FORMULARIO -->
        <section class="bg-white rounded-[30px] shadow-xl overflow-hidden border border-[#DEF4C6]">

            <!-- HEADER FORM -->
            <div class="bg-[#1B512D] px-8 py-6">

                <h2 class="text-2xl font-bold text-white">
                    Datos de la planta
                </h2>

                <p class="text-[#DEF4C6] mt-1">
                    Los campos marcados son necesarios para guardar la información.
                </p>

            </div>

            <!-- FORM -->
            <form th:action="@{/view/plantas/save}"
                  th:object="${plantas}"
                  method="post"
                  novalidate
                  class="p-8">

                <input type="hidden" th:field="*{id_plantas}" />

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- Codigo -->
                    <div>

                        <label class="block mb-2 font-bold text-[#1B512D]">
                            Codigo
                        </label>

                        <input type="text"
                               th:field="*{codigo}"
                               required
                               placeholder="Ingrese el codigo completo"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition duration-300 focus:border-[#1C7C54] focus:ring-4 focus:ring-[#73E2A7]/30">

                    </div>

                    <!-- Nombre -->
                    <div>

                        <label class="block mb-2 font-bold text-[#1B512D]">
                            Nombre
                        </label>

                        <input type="text"
                               th:field="*{nombre}"
                               required
                               placeholder="Ingrese el nombre completo"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition duration-300 focus:border-[#1C7C54] focus:ring-4 focus:ring-[#73E2A7]/30">

                    </div>

                    <!-- Nombre cientifico -->
                    <div>

                        <label class="block mb-2 font-bold text-[#1B512D]">
                            Nombre cientifico
                        </label>

                        <input type="text"
                               th:field="*{nombre_cientifico}"
                               required
                               placeholder="Ingrese el nombre cientifico completo"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition duration-300 focus:border-[#1C7C54] focus:ring-4 focus:ring-[#73E2A7]/30">

                    </div>

                    <!-- Especie -->
                    <div>

                        <label class="block mb-2 font-bold text-[#1B512D]">
                            Especie
                        </label>

                        <input type="text"
                               th:field="*{especie}"
                               required
                               placeholder="Ingrese la especie"
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition duration-300 focus:border-[#1C7C54] focus:ring-4 focus:ring-[#73E2A7]/30">

                    </div>

                    <!-- Cantidad -->
                    <div>

                        <label class="block mb-2 font-bold text-[#1B512D]">
                            Cantidad
                        </label>

                        <input type="text"
                               th:field="*{cantidad}"
                               required
                               placeholder="1234..."
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition duration-300 focus:border-[#1C7C54] focus:ring-4 focus:ring-[#73E2A7]/30">

                    </div>

                    <!-- Precio -->
                    <div>

                        <label class="block mb-2 font-bold text-[#1B512D]">
                            Precio
                        </label>

                        <input type="text"
                               th:field="*{precio}"
                               required
                               placeholder="1234..."
                               class="w-full rounded-2xl border border-gray-200 bg-gray-50 px-5 py-4 outline-none transition duration-300 focus:border-[#1C7C54] focus:ring-4 focus:ring-[#73E2A7]/30">

                    </div>

                </div>

                <!-- BOTONES -->
                <div class="flex flex-col sm:flex-row justify-end gap-4 mt-8 pt-6 border-t border-gray-100">

                    <a th:href="@{/view/plantas}"
                       class="btn-custom btn-verde justify-center">
                        ← Volver
                    </a>

                    <button type="submit"
                            class="btn-custom btn-principal justify-center">
                        💾 Guardar Planta
                    </button>

                </div>

            </form>

        </section>

    </main>

</div>

<script th:src="@{/js/script.js}"></script>

</body>
</html>
